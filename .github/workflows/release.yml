name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            os: linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
          - runner: macos-15-intel
            os: darwin
            arch: amd64
          - runner: macos-15
            os: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
      - uses: Swatinem/rust-cache@v2
      - name: Build and package
        env:
          VERSION: ${{ github.ref_name }}
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
        run: |
          cargo build --profile dist --locked --package sandbox-cli --package sandbox-mcp --package sandboxd
          archive="sandbox_${VERSION}_${OS}_${ARCH}.tar.gz"
          tar -C target/dist -czf "$archive" sandbox sandboxd sandbox-mcp
          if command -v sha256sum >/dev/null; then sha256sum "$archive" > "$archive.sha256"; else shasum -a 256 "$archive" > "$archive.sha256"; fi
      - name: Attest release archive
        uses: actions/attest@v4
        with:
          subject-path: sandbox_*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: sandbox-${{ matrix.os }}-${{ matrix.arch }}
          path: sandbox_*.tar.gz*

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
