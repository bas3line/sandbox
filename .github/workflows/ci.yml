name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo build --profile dist --workspace
      - name: Validate Compose profiles
        env:
          SANDBOX_API_TOKEN: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          SANDBOX_NODE_TOKEN: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          SANDBOX_PORT: 127.0.0.1:8080
          SANDBOX_TUNNEL_ENABLED: "true"
          SANDBOX_TUNNEL_ENTRYPOINT: web
          SANDBOX_TUNNEL_EDGE_TLS: "false"
          CLOUDFLARE_TUNNEL_TOKEN_FILE: /dev/null
        run: |
          docker compose -f deploy/compose/compose.yaml --profile edge config >/dev/null
          docker compose -f deploy/compose/compose.yaml -f deploy/compose/compose.caddy.yaml --profile caddy-edge config >/dev/null
          docker compose -f deploy/compose/compose.yaml -f deploy/compose/compose.cloudflare.yaml --profile cloudflare-edge config >/dev/null

  supply-chain:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
